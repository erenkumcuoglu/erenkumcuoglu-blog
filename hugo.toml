baseURL = "https://erenkumcuoglublog.netlify.app/blog/"
languageCode = "tr"
title = "Eren Kumcuoğlu — Blog"
theme = "erenblog"
paginate = 12
enableRobotsTXT = true
enableEmoji = true

[params]
  author = "Eren Kumcuoğlu"
  description = "Pazarlama, dijital strateji, farklılaşma ve iş dünyası üzerine düşünceler. 2007'den bu yana."
  mainSiteURL = "https://erenkumcuoglu.com"
  dateFormat = "2 January 2006"

[params.social]
  linkedin = "https://linkedin.com/in/erenkumcuoglu"
  email = "erenkumcuoglu@gmail.com"

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]

[menu]
  [[menu.main]]
    name = "Ana Sayfa"
    url = "https://erenkumcuoglu.com"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2
  [[menu.main]]
    name = "Kategoriler"
    url = "/blog/categories/"
    weight = 3
